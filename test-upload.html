<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test File Upload</title>
</head>
<body>
    <h1>Test Upload to SpheroSeg API</h1>
    
    <form id="uploadForm">
        <div>
            <label for="project_id">Project ID:</label>
            <input type="text" id="project_id" name="project_id" value="2">
        </div>
        <div>
            <label for="file">Select image:</label>
            <input type="file" id="file" name="file" accept="image/*">
        </div>
        <button type="submit">Upload</button>
    </form>
    
    <div id="result" style="margin-top: 20px; padding: 10px; background-color: #f0f0f0;"></div>
    
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const projectId = document.getElementById('project_id').value;
            const fileInput = document.getElementById('file');
            
            if (!fileInput.files.length) {
                document.getElementById('result').textContent = 'Please select a file';
                return;
            }
            
            formData.append('project_id', projectId);
            formData.append('file', fileInput.files[0]);
            
            document.getElementById('result').textContent = 'Uploading...';
            
            try {
                // Get token from localStorage like the main app would
                const token = localStorage.getItem('authToken');
                
                const response = await fetch('http://localhost:8000/images/upload', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = `
                        <p style="color: green;">Upload successful!</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <p style="color: red;">Upload failed with status ${response.status}</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <p style="color: red;">Error: ${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
